---
- name: Install HAProxy
  apt:
    name: haproxy
    state: present
    update_cache: true

- name: Deploy HAProxy config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  notify: Restart haproxy

- name: Test HAProxy config
  command: haproxy -c -f /etc/haproxy/haproxy.cfg
  changed_when: false

- name: Ensure HAProxy is enabled and running
  service:
    name: haproxy
    state: started
    enabled: true
