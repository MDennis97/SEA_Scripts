name: soc-siem-local

networks:
  socnet:
    driver: bridge

services:
  grafana:
    image: grafana/grafana:latest
    container_name: local-grafana
    restart: unless-stopped
    networks: [socnet]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: ${TZ}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - elasticsearch

  prometheus:
    image: prom/prometheus:latest
    container_name: local-prometheus
    restart: unless-stopped
    networks: [socnet]
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:latest
    container_name: local-loki
    restart: unless-stopped
    networks: [socnet]
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  tempo:
    image: grafana/tempo:latest
    container_name: local-tempo
    restart: unless-stopped
    networks: [socnet]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: local-elasticsearch
    restart: unless-stopped
    networks: [socnet]
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      TZ: ${TZ}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # Minimale Wazuh Manager testcontainer.
  # Voor productie is een volledige Wazuh deployment met indexer/dashboard/certificaten beter.
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: local-wazuh-manager
    restart: unless-stopped
    networks: [socnet]
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    environment:
      TZ: ${TZ}
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD}
    volumes:
      - wazuh_manager_data:/var/ossec/data

  # Agent-services staan bewust in een profile.
  # Op Windows/Docker Desktop geven host-mounts zoals / en /var/log vaak problemen.
  # Lokaal start je zonder profile. Op Linux/productie: docker compose --profile agents up -d
  node-exporter:
    image: prom/node-exporter:latest
    container_name: local-node-exporter
    restart: unless-stopped
    profiles: ["agents"]
    networks: [socnet]
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave

  promtail:
    image: grafana/promtail:latest
    container_name: local-promtail
    restart: unless-stopped
    profiles: ["agents"]
    networks: [socnet]
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
  elasticsearch_data:
  wazuh_manager_data:
