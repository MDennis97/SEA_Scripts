---
# IP-plan uit Technisch Ontwerp / projectcontext
net_gasten: "172.16.0.0/27"
net_observability: "172.16.0.64/27"
net_werkplekken: "172.16.0.96/27"
net_security: "172.16.0.128/27"
net_management: "172.16.0.160/27"
net_services: "172.16.1.0/24"

# Belangrijke servers
soc_server: "172.16.1.70"
ticketing_server: "172.16.1.71"
identity_1: "172.16.1.132"
identity_2: "172.16.1.133"
identity_vip: "172.16.1.134"

# Pas dit aan als jullie DNS een andere host is. Als pfSense DNS doet, laat dit op pfSense-interface/VIP staan.
dns_server: "172.16.0.161"

# pfSense interfacenamen. Pas aan naar jullie echte pfSense interface names.
# Kijk in pfSense bij Interfaces > Assignments of via ifconfig.
pfsense_if_gasten: "VLAN10_GASTEN"
pfsense_if_observability: "VLAN20_OBSERVABILITY"
pfsense_if_werkplekken: "VLAN30_WERKPLEKKEN"
pfsense_if_security: "VLAN40_SECURITY"
pfsense_if_services: "SERVICES"
pfsense_if_wan: "WAN"

# Cisco interface namen. Pas aan naar jullie subinterfaces/SVI's.
cisco_if_vlan10: "GigabitEthernet0/0/0.10"
cisco_if_vlan20: "GigabitEthernet0/0/0.20"
cisco_if_vlan30: "GigabitEthernet0/0/0.30"
cisco_if_vlan40: "GigabitEthernet0/0/0.40"
