---
- name: Install required packages on Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - docker.io
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add SSH user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user | default(ansible_env.SUDO_USER | default('root')) }}"
    groups: docker
    append: true
  when: ansible_user is defined and ansible_user != 'root'
