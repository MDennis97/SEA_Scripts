---
- name: Install Docker packages on Ubuntu/Debian
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - docker.io
      - docker-compose-v2
      - python3-docker
    state: present
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user is defined

- name: Check Docker Compose version
  ansible.builtin.command: docker compose version
  changed_when: false
