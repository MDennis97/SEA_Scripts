---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install BIND9 packages
  ansible.builtin.apt:
    name:
      - "{{ bind9_package_name }}"
      - "{{ bind9_utils_package_name }}"
    state: present

- name: Ensure BIND zones directory exists
  ansible.builtin.file:
    path: /etc/bind/zones
    state: directory
    owner: root
    group: bind
    mode: "0755"

- name: Deploy named.conf.options
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: root
    group: bind
    mode: "0644"
  notify: Restart BIND9

- name: Deploy named.conf.local
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: "0644"
  notify: Restart BIND9

- name: Deploy forward zone file on primary DNS server
  ansible.builtin.template:
    src: db.forward.j2
    dest: "{{ bind9_zone_file }}"
    owner: root
    group: bind
    mode: "0644"
  when: bind9_role == "primary"
  notify: Restart BIND9

- name: Deploy reverse zone file on primary DNS server
  ansible.builtin.template:
    src: db.reverse.j2
    dest: "{{ bind9_reverse_zone_file }}"
    owner: root
    group: bind
    mode: "0644"
  when: bind9_role == "primary"
  notify: Restart BIND9

- name: Check BIND configuration
  ansible.builtin.command:
    cmd: named-checkconf
  changed_when: false

- name: Check forward zone on primary DNS server
  ansible.builtin.command:
    cmd: "named-checkzone {{ bind9_domain }} {{ bind9_zone_file }}"
  changed_when: false
  when: bind9_role == "primary"

- name: Check reverse zone on primary DNS server
  ansible.builtin.command:
    cmd: "named-checkzone {{ bind9_reverse_zone }} {{ bind9_reverse_zone_file }}"
  changed_when: false
  when: bind9_role == "primary"

- name: Enable and start BIND9
  ansible.builtin.systemd:
    name: "{{ bind9_service_name }}"
    enabled: true
    state: started