---
- name: Harden Ubuntu Server 24.04 LTS
  hosts: ubuntu_servers
  become: true

  vars:
    ssh_port: 22
    allowed_ssh_network: "192.168.1.0/24"

    packages_to_install:
      - ufw
      - fail2ban
      - unattended-upgrades
      - auditd
      - audispd-plugins
      - curl
      - vim
      - ca-certificates
      - gnupg
      - lsb-release

    packages_to_remove:
      - telnet
      - rsh-client
      - talk
      - xinetd
      - nis

  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install security packages
      ansible.builtin.apt:
        name: "{{ packages_to_install }}"
        state: present

    - name: Remove insecure legacy packages
      ansible.builtin.apt:
        name: "{{ packages_to_remove }}"
        state: absent
        purge: true

    - name: Enable automatic security updates
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Configure unattended-upgrades for security updates
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };

          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Disable empty SSH passwords
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Limit SSH authentication attempts
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Set SSH idle timeout
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED SSH HARDENING"
        block: |
          ClientAliveInterval 300
          ClientAliveCountMax 2
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Set default UFW incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set default UFW outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH from management network only
      community.general.ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp
        from_ip: "{{ allowed_ssh_network }}"

    - name: Enable UFW firewall
      community.general.ufw:
        state: enabled

    - name: Configure Fail2Ban SSH jail
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/sshd.local
        owner: root
        group: root
        mode: "0644"
        content: |
          [sshd]
          enabled = true
          port = {{ ssh_port }}
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          findtime = 10m
          bantime = 1h
      notify: Restart fail2ban

    - name: Disable IPv4 forwarding
      ansible.builtin.sysctl:
        name: net.ipv4.ip_forward
        value: "0"
        state: present
        reload: true

    - name: Enable TCP SYN cookies
      ansible.builtin.sysctl:
        name: net.ipv4.tcp_syncookies
        value: "1"
        state: present
        reload: true

    - name: Disable ICMP redirects
      ansible.builtin.sysctl:
        name: net.ipv4.conf.all.accept_redirects
        value: "0"
        state: present
        reload: true

    - name: Disable secure ICMP redirects
      ansible.builtin.sysctl:
        name: net.ipv4.conf.all.secure_redirects
        value: "0"
        state: present
        reload: true

    - name: Disable source routed packets
      ansible.builtin.sysctl:
        name: net.ipv4.conf.all.accept_source_route
        value: "0"
        state: present
        reload: true

    - name: Enable reverse path filtering
      ansible.builtin.sysctl:
        name: net.ipv4.conf.all.rp_filter
        value: "1"
        state: present
        reload: true

    - name: Disable IPv6 redirects
      ansible.builtin.sysctl:
        name: net.ipv6.conf.all.accept_redirects
        value: "0"
        state: present
        reload: true

    - name: Disable IPv6 source routed packets
      ansible.builtin.sysctl:
        name: net.ipv6.conf.all.accept_source_route
        value: "0"
        state: present
        reload: true

    - name: Set password maximum age
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS'
        line: 'PASS_MAX_DAYS   90'

    - name: Set password minimum age
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MIN_DAYS'
        line: 'PASS_MIN_DAYS   1'

    - name: Set password warning age
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_WARN_AGE'
        line: 'PASS_WARN_AGE   7'

    - name: Ensure auditd is enabled and running
      ansible.builtin.service:
        name: auditd
        enabled: true
        state: started

    - name: Ensure fail2ban is enabled and running
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
